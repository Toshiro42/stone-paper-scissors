<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game History · SPS Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080b14;
      --surface:  #0d1220;
      --border:   #1e2d4a;
      --neon1:    #00f5c8;
      --neon2:    #ff4ec8;
      --neon3:    #ffe100;
      --text:     #c8daf5;
      --muted:    #4a607a;
      --radius:   12px;
      --glow1:    0 0 20px rgba(0,245,200,.35);
      --glow2:    0 0 20px rgba(255,78,200,.35);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,245,200,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,200,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    #app {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto;
      padding: 20px 16px 60px;
    }

    /* header */
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0 32px;
    }
    .logo {
      font-family: 'Orbitron', monospace; font-size: clamp(14px,3vw,18px);
      font-weight: 900; letter-spacing: .12em;
      color: var(--neon1); text-shadow: var(--glow1);
    }
    .logo span { color: var(--neon2); }
    .nav-link {
      font-family: 'Orbitron', monospace; font-size: 11px;
      color: var(--muted); text-decoration: none; letter-spacing: .1em;
      border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px;
      transition: color .2s, border-color .2s, box-shadow .2s;
    }
    .nav-link:hover { color: var(--neon1); border-color: var(--neon1); box-shadow: var(--glow1); }

    /* page title */
    .page-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(20px, 5vw, 30px);
      font-weight: 900; color: #fff;
      margin-bottom: 6px;
    }
    .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    /* stats bar */
    .stats-bar {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-bottom: 28px;
    }
    .stat-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; text-align: center;
    }
    .stat-val {
      font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900;
      color: var(--neon1); text-shadow: var(--glow1);
    }
    .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: .08em; }

    /* search / filter */
    .filter-row {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .filter-row input {
      flex: 1; padding: 10px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'Exo 2', sans-serif; font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    .filter-row input:focus { border-color: var(--neon1); }
    .filter-row input::placeholder { color: var(--muted); }

    /* game card */
    .game-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 16px;
      overflow: hidden; transition: border-color .2s, box-shadow .2s;
      cursor: pointer;
    }
    .game-card:hover { border-color: rgba(0,245,200,.3); box-shadow: 0 0 16px rgba(0,245,200,.08); }

    .game-card-header {
      display: grid; grid-template-columns: auto 1fr auto;
      align-items: center; gap: 14px;
      padding: 16px 20px;
    }
    .game-id-badge {
      font-family: 'Orbitron', monospace; font-size: 10px;
      color: var(--muted); background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 10px; white-space: nowrap;
    }
    .game-matchup {
      font-size: 14px; font-weight: 600;
    }
    .game-matchup .vs { color: var(--muted); margin: 0 8px; font-size: 11px; }
    .game-status-badge {
      font-family: 'Orbitron', monospace; font-size: 10px;
      padding: 4px 10px; border-radius: 6px; white-space: nowrap;
    }
    .status-completed { background: rgba(0,245,200,.12); color: var(--neon1); border: 1px solid rgba(0,245,200,.3); }
    .status-in-progress { background: rgba(255,225,0,.10); color: var(--neon3); border: 1px solid rgba(255,225,0,.3); }

    .game-card-body {
      padding: 0 20px 16px;
      display: none;
      animation: fadeIn .25s ease;
    }
    .game-card.expanded .game-card-body { display: block; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .score-row {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 12px;
      background: var(--bg); border-radius: 10px;
      padding: 14px 16px; margin-bottom: 14px;
    }
    .sc-player { text-align: center; }
    .sc-name { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-family: 'Orbitron', monospace; letter-spacing: .08em; }
    .sc-val { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900; }
    .sc-val.c1 { color: var(--neon1); }
    .sc-val.c2 { color: var(--neon2); }
    .sc-sep { font-family: 'Orbitron', monospace; color: var(--border); font-weight: 900; }

    .winner-chip {
      display: inline-block; font-family: 'Orbitron', monospace; font-size: 11px;
      padding: 5px 14px; border-radius: 20px; margin-bottom: 14px;
    }
    .wc-p1   { background: rgba(0,245,200,.12); color: var(--neon1); border: 1px solid var(--neon1); }
    .wc-p2   { background: rgba(255,78,200,.12); color: var(--neon2); border: 1px solid var(--neon2); }
    .wc-tie  { background: rgba(255,225,0,.10);  color: var(--neon3); border: 1px solid var(--neon3); }
    .wc-prog { background: rgba(255,225,0,.08);  color: var(--neon3); border: 1px solid rgba(255,225,0,.3); }

    .rounds-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .rounds-table th {
      text-align: left; padding: 6px 8px;
      font-family: 'Orbitron', monospace; font-size: 9px;
      color: var(--muted); letter-spacing: .12em;
      border-bottom: 1px solid var(--border);
    }
    .rounds-table td { padding: 8px 8px; border-bottom: 1px solid rgba(30,45,74,.5); }
    .rounds-table tr:last-child td { border-bottom: none; }
    .badge {
      font-family: 'Orbitron', monospace; font-size: 10px;
      padding: 2px 8px; border-radius: 4px;
    }
    .badge-p1  { background: rgba(0,245,200,.15); color: var(--neon1); }
    .badge-p2  { background: rgba(255,78,200,.15); color: var(--neon2); }
    .badge-tie { background: rgba(255,225,0,.12);  color: var(--neon3); }

    .game-meta {
      font-size: 11px; color: var(--muted); margin-top: 8px;
    }

    /* empty state */
    .empty {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }
    .empty-text { font-family: 'Orbitron', monospace; font-size: 13px; letter-spacing: .1em; }
    .empty-sub { font-size: 13px; margin-top: 8px; }

    /* loading */
    .loading {
      text-align: center; padding: 60px 20px;
      font-family: 'Orbitron', monospace; font-size: 12px;
      color: var(--neon1); letter-spacing: .15em;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:.4; } 50% { opacity: 1; } }

    .expand-icon { font-size: 18px; color: var(--muted); transition: transform .2s; }
    .game-card.expanded .expand-icon { transform: rotate(180deg); }

    @media(max-width:520px) {
      .stats-bar { grid-template-columns: 1fr 1fr; }
      .game-card-header { grid-template-columns: 1fr auto; }
      .game-id-badge { display: none; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">SPS<span>·</span>ARENA</div>
    <a href="index.html" class="nav-link">PLAY GAME</a>
  </header>

  <h1 class="page-title">GAME HISTORY</h1>
  <p class="page-sub">All past battles and their results</p>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-box">
      <div class="stat-val" id="stat-total">—</div>
      <div class="stat-lbl">TOTAL GAMES</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-completed">—</div>
      <div class="stat-lbl">COMPLETED</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-ties">—</div>
      <div class="stat-lbl">TIED GAMES</div>
    </div>
  </div>

  <!-- Search -->
  <div class="filter-row">
    <input id="search-input" type="text" placeholder="Search by player name…" />
  </div>

  <!-- Game list -->
  <div id="games-container">
    <div class="loading">LOADING GAMES…</div>
  </div>
</div>

<script>
const API = '/api/games';
let allGames = [];

const icon = { STONE: '🪨', PAPER: '📄', SCISSORS: '✂️' };

async function loadGames() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error();
    allGames = await res.json();
    renderStats();
    renderGames(allGames);
  } catch {
    document.getElementById('games-container').innerHTML =
      `<div class="empty">
        <span class="empty-icon">⚠️</span>
        <div class="empty-text">FAILED TO LOAD</div>
        <div class="empty-sub">Make sure the server is running</div>
       </div>`;
  }
}

function renderStats() {
  const total     = allGames.length;
  const completed = allGames.filter(g => g.status === 'COMPLETED').length;
  const ties      = allGames.filter(g => g.winner === 'TIE').length;
  document.getElementById('stat-total').textContent     = total;
  document.getElementById('stat-completed').textContent = completed;
  document.getElementById('stat-ties').textContent      = ties;
}

function renderGames(games) {
  const container = document.getElementById('games-container');

  if (games.length === 0) {
    container.innerHTML =
      `<div class="empty">
        <span class="empty-icon">🎮</span>
        <div class="empty-text">NO GAMES YET</div>
        <div class="empty-sub"><a href="index.html" style="color:var(--neon1)">Play your first game!</a></div>
       </div>`;
    return;
  }

  container.innerHTML = '';
  games.forEach(game => {
    const card = createGameCard(game);
    container.appendChild(card);
  });
}

function createGameCard(game) {
  const card = document.createElement('div');
  card.className = 'game-card';
  card.dataset.id = game.id;

  const statusBadge = game.status === 'COMPLETED'
    ? `<span class="game-status-badge status-completed">COMPLETED</span>`
    : `<span class="game-status-badge status-in-progress">IN PROGRESS</span>`;

  const dateStr = new Date(game.createdAt).toLocaleString('en-IN', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });

  // Winner chip
  let winnerChip = '';
  if (game.status === 'COMPLETED') {
    if (game.winner === 'TIE') {
      winnerChip = `<span class="winner-chip wc-tie">🤝 DRAW</span>`;
    } else if (game.winner === game.player1Name) {
      winnerChip = `<span class="winner-chip wc-p1">🏆 ${game.winner} wins</span>`;
    } else {
      winnerChip = `<span class="winner-chip wc-p2">🏆 ${game.winner} wins</span>`;
    }
  } else {
    winnerChip = `<span class="winner-chip wc-prog">⚔️ Round ${game.completedRounds}/${game.totalRounds}</span>`;
  }

  // Rounds rows
  let roundsHtml = '';
  if (game.rounds && game.rounds.length > 0) {
    const rows = game.rounds.map(r => {
      const badgeClass = r.result === 'PLAYER1_WINS' ? 'badge-p1' :
                         r.result === 'PLAYER2_WINS' ? 'badge-p2' : 'badge-tie';
      const badgeText  = r.result === 'PLAYER1_WINS' ? game.player1Name :
                         r.result === 'PLAYER2_WINS' ? game.player2Name : 'TIE';
      return `<tr>
        <td style="color:var(--muted);font-family:'Orbitron',monospace;font-size:10px">R${r.roundNumber}</td>
        <td>${icon[r.player1Choice]} ${r.player1Choice}</td>
        <td>${icon[r.player2Choice]} ${r.player2Choice}</td>
        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
      </tr>`;
    }).join('');

    roundsHtml = `
      <table class="rounds-table">
        <thead>
          <tr>
            <th>#</th>
            <th>${game.player1Name.toUpperCase()}</th>
            <th>${game.player2Name.toUpperCase()}</th>
            <th>RESULT</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  } else {
    roundsHtml = `<p style="color:var(--muted);font-size:13px">No rounds played yet.</p>`;
  }

  card.innerHTML = `
    <div class="game-card-header">
      <span class="game-id-badge">#${game.id}</span>
      <div class="game-matchup">
        ${game.player1Name} <span class="vs">VS</span> ${game.player2Name}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${statusBadge}
        <span class="expand-icon">▾</span>
      </div>
    </div>
    <div class="game-card-body">
      <div class="score-row">
        <div class="sc-player">
          <div class="sc-name">${game.player1Name.toUpperCase()}</div>
          <div class="sc-val c1">${game.player1Score}</div>
        </div>
        <div class="sc-sep">—</div>
        <div class="sc-player">
          <div class="sc-name">${game.player2Name.toUpperCase()}</div>
          <div class="sc-val c2">${game.player2Score}</div>
        </div>
      </div>
      <div style="margin-bottom:14px">${winnerChip}</div>
      ${roundsHtml}
      <div class="game-meta">Started: ${dateStr}${game.completedAt ? ' · Ended: ' + new Date(game.completedAt).toLocaleString('en-IN', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : ''}</div>
    </div>`;

  card.querySelector('.game-card-header').addEventListener('click', () => {
    card.classList.toggle('expanded');
  });

  return card;
}

// Search
document.getElementById('search-input').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  const filtered = q
    ? allGames.filter(g =>
        g.player1Name.toLowerCase().includes(q) ||
        g.player2Name.toLowerCase().includes(q))
    : allGames;
  renderGames(filtered);
});

loadGames();
</script>
</body>
</html>
