<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stone · Paper · Scissors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080b14;
      --surface:   #0d1220;
      --border:    #1e2d4a;
      --neon1:     #00f5c8;
      --neon2:     #ff4ec8;
      --neon3:     #ffe100;
      --text:      #c8daf5;
      --muted:     #4a607a;
      --win:       #00f5c8;
      --lose:      #ff4e6a;
      --tie:       #ffe100;
      --radius:    12px;
      --glow1:     0 0 20px rgba(0,245,200,.35);
      --glow2:     0 0 20px rgba(255,78,200,.35);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      overflow-x: hidden;
    }

    /* ── grid bg ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,245,200,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,200,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── layout ──────────────────────────────── */
    #app {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 16px 60px;
    }

    .screen { display: none; width: 100%; max-width: 760px; animation: fadeIn .35s ease; }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

    /* ── header ──────────────────────────────── */
    header {
      width: 100%; max-width: 760px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0 32px;
    }
    .logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 900;
      letter-spacing: .12em;
      color: var(--neon1);
      text-shadow: var(--glow1);
    }
    .logo span { color: var(--neon2); }
    .nav-link {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: .1em;
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 6px;
      transition: color .2s, border-color .2s, box-shadow .2s;
    }
    .nav-link:hover { color: var(--neon1); border-color: var(--neon1); box-shadow: var(--glow1); }

    /* ── cards ───────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 40px;
    }
    @media(max-width:520px) { .card { padding: 24px 20px; } }

    /* ── typography ──────────────────────────── */
    .headline {
      font-family: 'Orbitron', monospace;
      font-size: clamp(22px, 5vw, 34px);
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 8px;
      text-shadow: var(--glow1);
    }
    .sub {
      text-align: center; color: var(--muted);
      font-size: 14px; margin-bottom: 36px;
      letter-spacing: .04em;
    }

    /* ── form ────────────────────────────────── */
    .field { margin-bottom: 20px; }
    .field label {
      display: block; font-size: 11px; font-family: 'Orbitron', monospace;
      letter-spacing: .12em; color: var(--muted); margin-bottom: 8px;
    }
    .field input {
      width: 100%; padding: 13px 16px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: 'Exo 2', sans-serif;
      font-size: 16px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus { border-color: var(--neon1); box-shadow: 0 0 0 3px rgba(0,245,200,.12); }
    .field input::placeholder { color: var(--muted); }

    /* ── buttons ──────────────────────────────── */
    .btn {
      display: inline-block; padding: 14px 28px;
      font-family: 'Orbitron', monospace; font-size: 13px;
      font-weight: 700; letter-spacing: .12em;
      border: none; border-radius: 8px; cursor: pointer;
      transition: transform .15s, box-shadow .2s;
      text-decoration: none;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--neon1), #00b8a0);
      color: #001a14; box-shadow: var(--glow1);
      width: 100%;
    }
    .btn-primary:hover { box-shadow: 0 0 30px rgba(0,245,200,.55); }
    .btn-outline {
      background: transparent; color: var(--neon1);
      border: 1px solid var(--neon1); box-shadow: var(--glow1);
    }
    .btn-outline:hover { background: rgba(0,245,200,.08); }
    .btn-sm { padding: 8px 18px; font-size: 10px; }

    /* ── scoreboard ──────────────────────────── */
    .scoreboard {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 12px;
      padding: 20px 0 28px;
    }
    .score-player { text-align: center; }
    .score-name {
      font-size: 12px; font-family: 'Orbitron', monospace;
      letter-spacing: .08em; color: var(--muted);
      margin-bottom: 6px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .score-num {
      font-family: 'Orbitron', monospace;
      font-size: clamp(36px, 10vw, 56px);
      font-weight: 900; line-height: 1;
    }
    #p1-score-val { color: var(--neon1); text-shadow: var(--glow1); }
    #p2-score-val { color: var(--neon2); text-shadow: var(--glow2); }
    .score-sep {
      font-family: 'Orbitron', monospace;
      font-size: 20px; color: var(--border); font-weight: 900;
    }

    /* ── round counter ─────────────────────── */
    .round-info {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 28px;
    }
    .round-dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 1px solid var(--border);
      transition: background .3s, border-color .3s;
    }
    .round-dot.done { background: var(--neon1); border-color: var(--neon1); }
    .round-dot.active { background: var(--neon2); border-color: var(--neon2);
      box-shadow: 0 0 8px var(--neon2); }
    .round-label {
      font-family: 'Orbitron', monospace; font-size: 11px;
      color: var(--muted); letter-spacing: .12em; margin-right: 10px;
    }

    /* ── choice panel ─────────────────────── */
    .choices-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
    @media(max-width: 520px) { .choices-wrap { gap: 16px; } }

    .player-col { display: flex; flex-direction: column; align-items: center; }
    .player-title {
      font-family: 'Orbitron', monospace; font-size: 10px;
      letter-spacing: .15em; color: var(--muted); margin-bottom: 16px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 100%;
    }
    .choice-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; }

    .choice-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer;
      font-family: 'Exo 2', sans-serif; font-size: 14px; font-weight: 600;
      color: var(--text); transition: border-color .2s, box-shadow .2s, background .2s;
      width: 100%;
    }
    .choice-btn:hover { border-color: var(--neon1); background: rgba(0,245,200,.04); }
    .choice-btn.selected-p1 {
      border-color: var(--neon1); background: rgba(0,245,200,.1);
      box-shadow: var(--glow1);
    }
    .choice-btn.selected-p2 {
      border-color: var(--neon2); background: rgba(255,78,200,.1);
      box-shadow: var(--glow2);
    }
    .choice-btn.disabled { pointer-events: none; opacity: .4; }
    .choice-icon { font-size: 24px; }

    /* ── play round button ─────────────────── */
    .play-row { margin-top: 28px; }
    #play-round-btn { width: 100%; }
    #play-round-btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

    /* ── round result toast ───────────────── */
    .result-toast {
      margin-top: 20px; padding: 16px 20px;
      border-radius: 10px; text-align: center;
      font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 700;
      letter-spacing: .06em; display: none;
      animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
    }
    .result-toast.show { display: block; }
    .result-toast.p1-wins { background: rgba(0,245,200,.12); border: 1px solid var(--neon1); color: var(--neon1); }
    .result-toast.p2-wins { background: rgba(255,78,200,.12); border: 1px solid var(--neon2); color: var(--neon2); }
    .result-toast.tie      { background: rgba(255,225,0,.10); border: 1px solid var(--tie);  color: var(--tie); }
    @keyframes popIn {
      from { opacity:0; transform: scale(.85) translateY(8px); }
      to   { opacity:1; transform: none; }
    }

    /* ── rounds log ───────────────────────── */
    .rounds-log { margin-top: 28px; }
    .rounds-log-title {
      font-family: 'Orbitron', monospace; font-size: 10px;
      letter-spacing: .15em; color: var(--muted); margin-bottom: 12px;
    }
    .round-row {
      display: grid; grid-template-columns: 36px 1fr auto 1fr;
      align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 8px;
      font-size: 13px; margin-bottom: 6px;
      border: 1px solid var(--border); background: var(--bg);
      animation: fadeIn .2s ease;
    }
    .rr-num {
      font-family: 'Orbitron', monospace; font-size: 10px; color: var(--muted);
    }
    .rr-p1 { display: flex; align-items: center; gap: 6px; }
    .rr-p2 { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
    .rr-vs  { text-align: center; font-size: 10px; color: var(--muted); font-family: 'Orbitron', monospace; }
    .rr-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      font-family: 'Orbitron', monospace; font-weight: 700;
    }
    .badge-p1  { background: rgba(0,245,200,.15); color: var(--neon1); }
    .badge-p2  { background: rgba(255,78,200,.15); color: var(--neon2); }
    .badge-tie { background: rgba(255,225,0,.12);  color: var(--tie); }

    /* ── final screen ─────────────────────── */
    .winner-banner {
      text-align: center; padding: 32px 0 24px;
    }
    .winner-trophy { font-size: 72px; display: block; margin-bottom: 16px; }
    .winner-label {
      font-family: 'Orbitron', monospace; font-size: 11px;
      color: var(--muted); letter-spacing: .2em; margin-bottom: 8px;
    }
    .winner-name {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 7vw, 42px);
      font-weight: 900; color: #fff;
    }
    .winner-name.p1 { color: var(--neon1); text-shadow: var(--glow1); }
    .winner-name.p2 { color: var(--neon2); text-shadow: var(--glow2); }
    .winner-name.tie { color: var(--tie); text-shadow: 0 0 20px rgba(255,225,0,.5); }
    .final-scores {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 12px; margin: 28px 0;
    }
    .final-score-box {
      text-align: center; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 16px 8px;
    }
    .fsb-val { font-family: 'Orbitron', monospace; font-size: 32px; font-weight: 900; }
    .fsb-val.c1 { color: var(--neon1); }
    .fsb-val.c2 { color: var(--neon2); }
    .fsb-val.ct { color: var(--tie); }
    .fsb-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .final-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 28px;
    }

    /* ── confetti ─────────────────────────── */
    .confetti-piece {
      position: fixed; top: -10px; pointer-events: none; z-index: 999;
      width: 8px; height: 8px; border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0)   rotate(0deg);    opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ── error msg ────────────────────────── */
    .error-msg {
      background: rgba(255,78,106,.1); border: 1px solid rgba(255,78,106,.4);
      color: #ff6b87; border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">SPS<span>·</span>ARENA</div>
    <a href="history.html" class="nav-link">GAME HISTORY</a>
  </header>

  <!-- ── SCREEN 1: Player Setup ─────────────── -->
  <div id="screen-setup" class="screen active">
    <div class="card">
      <h1 class="headline">STONE · PAPER · SCISSORS</h1>
      <p class="sub">Enter player names to begin a 6-round battle</p>
      <div id="setup-error" class="error-msg"></div>
      <div class="field">
        <label for="p1-name">PLAYER 1</label>
        <input id="p1-name" type="text" placeholder="Enter name…" maxlength="24" autocomplete="off" />
      </div>
      <div class="field">
        <label for="p2-name">PLAYER 2</label>
        <input id="p2-name" type="text" placeholder="Enter name…" maxlength="24" autocomplete="off" />
      </div>
      <button class="btn btn-primary" id="start-btn">START GAME</button>
    </div>
  </div>

  <!-- ── SCREEN 2: Game Play ────────────────── -->
  <div id="screen-game" class="screen">
    <div class="card">
      <!-- Scoreboard -->
      <div class="scoreboard">
        <div class="score-player">
          <div class="score-name" id="p1-score-name">PLAYER 1</div>
          <div class="score-num" id="p1-score-val">0</div>
        </div>
        <div class="score-sep">VS</div>
        <div class="score-player">
          <div class="score-name" id="p2-score-name">PLAYER 2</div>
          <div class="score-num" id="p2-score-val">0</div>
        </div>
      </div>

      <!-- Round dots -->
      <div class="round-info">
        <span class="round-label">ROUND</span>
        <div id="dots-container"></div>
      </div>

      <!-- Choice pickers -->
      <div class="choices-wrap">
        <div class="player-col">
          <div class="player-title" id="p1-choice-title">PLAYER 1</div>
          <div class="choice-btns" id="p1-choices">
            <button class="choice-btn" data-player="1" data-value="STONE"><span class="choice-icon">🪨</span>Stone</button>
            <button class="choice-btn" data-player="1" data-value="PAPER"><span class="choice-icon">📄</span>Paper</button>
            <button class="choice-btn" data-player="1" data-value="SCISSORS"><span class="choice-icon">✂️</span>Scissors</button>
          </div>
        </div>
        <div class="player-col">
          <div class="player-title" id="p2-choice-title">PLAYER 2</div>
          <div class="choice-btns" id="p2-choices">
            <button class="choice-btn" data-player="2" data-value="STONE"><span class="choice-icon">🪨</span>Stone</button>
            <button class="choice-btn" data-player="2" data-value="PAPER"><span class="choice-icon">📄</span>Paper</button>
            <button class="choice-btn" data-player="2" data-value="SCISSORS"><span class="choice-icon">✂️</span>Scissors</button>
          </div>
        </div>
      </div>

      <div class="play-row">
        <button class="btn btn-primary" id="play-round-btn" disabled>PLAY ROUND</button>
      </div>

      <!-- Round result toast -->
      <div class="result-toast" id="result-toast"></div>

      <!-- Rounds log -->
      <div class="rounds-log" id="rounds-log" style="display:none">
        <div class="rounds-log-title">ROUND HISTORY</div>
        <div id="rounds-log-list"></div>
      </div>
    </div>
  </div>

  <!-- ── SCREEN 3: Final Result ─────────────── -->
  <div id="screen-result" class="screen">
    <div class="card">
      <div class="winner-banner">
        <span class="winner-trophy" id="result-trophy">🏆</span>
        <div class="winner-label" id="result-label">WINNER</div>
        <div class="winner-name" id="result-winner-name">—</div>
      </div>
      <div class="final-scores">
        <div class="final-score-box">
          <div class="fsb-val c1" id="final-p1-score">0</div>
          <div class="fsb-label" id="final-p1-name">P1</div>
        </div>
        <div class="final-score-box">
          <div class="fsb-val ct" id="final-tie-count">0</div>
          <div class="fsb-label">TIES</div>
        </div>
        <div class="final-score-box">
          <div class="fsb-val c2" id="final-p2-score">0</div>
          <div class="fsb-label" id="final-p2-name">P2</div>
        </div>
      </div>
      <div class="rounds-log">
        <div class="rounds-log-title">ALL ROUNDS</div>
        <div id="final-rounds-list"></div>
      </div>
      <div class="final-actions">
        <button class="btn btn-primary" id="play-again-btn">PLAY AGAIN</button>
        <a href="history.html" class="btn btn-outline" style="text-align:center;line-height:1.6">VIEW HISTORY</a>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/api/games';

let gameId = null;
let p1Name = '';
let p2Name = '';
let p1Choice = null;
let p2Choice = null;
let completedRounds = 0;
const TOTAL_ROUNDS = 6;

// ── Utility ──────────────────────────────────────
const $ = id => document.getElementById(id);
const show = id => $(id).classList.add('active');
const hide = id => $(id).classList.remove('active');

function showScreen(name) {
  ['screen-setup','screen-game','screen-result'].forEach(s => {
    const el = $(s);
    if (s === `screen-${name}`) {
      el.style.display = 'block';
      el.classList.add('active');
    } else {
      el.style.display = 'none';
      el.classList.remove('active');
    }
  });
}

// ── Round dots ────────────────────────────────────
function renderDots(completed, active) {
  const container = $('dots-container');
  container.innerHTML = '';
  for (let i = 1; i <= TOTAL_ROUNDS; i++) {
    const d = document.createElement('span');
    d.className = 'round-dot' +
      (i < active ? ' done' : i === active ? ' active' : '');
    d.style.marginLeft = i === 1 ? '0' : '6px';
    container.appendChild(d);
  }
}

// ── Choice selection ──────────────────────────────
document.querySelectorAll('.choice-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const player = btn.dataset.player;
    const value  = btn.dataset.value;

    if (player === '1') {
      document.querySelectorAll('#p1-choices .choice-btn')
        .forEach(b => b.classList.remove('selected-p1'));
      btn.classList.add('selected-p1');
      p1Choice = value;
    } else {
      document.querySelectorAll('#p2-choices .choice-btn')
        .forEach(b => b.classList.remove('selected-p2'));
      btn.classList.add('selected-p2');
      p2Choice = value;
    }

    $('play-round-btn').disabled = !(p1Choice && p2Choice);
  });
});

// ── Start game ────────────────────────────────────
$('start-btn').addEventListener('click', async () => {
  const p1 = $('p1-name').value.trim();
  const p2 = $('p2-name').value.trim();
  const errEl = $('setup-error');

  if (!p1 || !p2) {
    errEl.textContent = 'Both player names are required.';
    errEl.classList.add('show');
    return;
  }
  errEl.classList.remove('show');

  $('start-btn').textContent = 'STARTING…';
  $('start-btn').disabled = true;

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ player1Name: p1, player2Name: p2 })
    });
    if (!res.ok) throw new Error('Server error');
    const game = await res.json();

    gameId = game.id;
    p1Name = game.player1Name;
    p2Name = game.player2Name;
    completedRounds = 0;

    // Populate game screen
    $('p1-score-name').textContent = p1Name.toUpperCase();
    $('p2-score-name').textContent = p2Name.toUpperCase();
    $('p1-score-val').textContent = '0';
    $('p2-score-val').textContent = '0';
    $('p1-choice-title').textContent = p1Name.toUpperCase();
    $('p2-choice-title').textContent = p2Name.toUpperCase();
    $('rounds-log-list').innerHTML = '';
    $('rounds-log').style.display = 'none';
    $('result-toast').className = 'result-toast';
    resetChoices();
    renderDots(0, 1);
    showScreen('game');
  } catch (e) {
    errEl.textContent = 'Failed to start game. Is the server running?';
    errEl.classList.add('show');
  } finally {
    $('start-btn').textContent = 'START GAME';
    $('start-btn').disabled = false;
  }
});

// ── Play round ────────────────────────────────────
$('play-round-btn').addEventListener('click', async () => {
  if (!p1Choice || !p2Choice) return;

  $('play-round-btn').disabled = true;
  $('play-round-btn').textContent = 'PLAYING…';

  try {
    const res = await fetch(`${API}/${gameId}/rounds`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ player1Choice: p1Choice, player2Choice: p2Choice })
    });
    if (!res.ok) throw new Error('Server error');
    const data = await res.json();

    const round = data.round;
    const game  = data.game;

    completedRounds = game.completedRounds;

    // Update scores
    $('p1-score-val').textContent = game.player1Score;
    $('p2-score-val').textContent = game.player2Score;

    // Show result toast
    const toast = $('result-toast');
    toast.className = 'result-toast show ' +
      (round.result === 'PLAYER1_WINS' ? 'p1-wins' :
       round.result === 'PLAYER2_WINS' ? 'p2-wins' : 'tie');
    toast.textContent = round.resultLabel;

    // Add to log
    addRoundRow(round);
    $('rounds-log').style.display = 'block';

    // Update dots
    renderDots(completedRounds, completedRounds + 1);

    if (game.status === 'COMPLETED') {
      setTimeout(() => showFinalScreen(game), 900);
      return;
    }

    resetChoices();
    $('play-round-btn').disabled = true;
    $('play-round-btn').textContent = 'PLAY ROUND';
  } catch (e) {
    $('play-round-btn').disabled = false;
    $('play-round-btn').textContent = 'PLAY ROUND';
    alert('Error submitting round. Please try again.');
  }
});

function addRoundRow(round) {
  const list = $('rounds-log-list');
  const row = document.createElement('div');
  row.className = 'round-row';

  const icon = { STONE: '🪨', PAPER: '📄', SCISSORS: '✂️' };
  const badge = round.result === 'PLAYER1_WINS' ? `<span class="rr-badge badge-p1">${p1Name}</span>` :
                round.result === 'PLAYER2_WINS' ? `<span class="rr-badge badge-p2">${p2Name}</span>` :
                `<span class="rr-badge badge-tie">TIE</span>`;

  row.innerHTML = `
    <span class="rr-num">R${round.roundNumber}</span>
    <span class="rr-p1">${icon[round.player1Choice]} ${round.player1Choice}</span>
    ${badge}
    <span class="rr-p2">${round.player2Choice} ${icon[round.player2Choice]}</span>
  `;
  list.appendChild(row);
}

function resetChoices() {
  p1Choice = null;
  p2Choice = null;
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.classList.remove('selected-p1', 'selected-p2');
  });
}

// ── Final screen ──────────────────────────────────
function showFinalScreen(game) {
  const winner = game.winner;

  $('final-p1-score').textContent = game.player1Score;
  $('final-p2-score').textContent = game.player2Score;
  $('final-tie-count').textContent = game.tieCount;
  $('final-p1-name').textContent = p1Name;
  $('final-p2-name').textContent = p2Name;

  const trophy = $('result-trophy');
  const label  = $('result-label');
  const name   = $('result-winner-name');

  if (winner === 'TIE') {
    trophy.textContent = '🤝';
    label.textContent  = 'IT\'S A TIE';
    name.textContent   = 'DRAW!';
    name.className     = 'winner-name tie';
  } else {
    trophy.textContent = '🏆';
    label.textContent  = 'WINNER';
    name.textContent   = winner.toUpperCase();
    name.className     = 'winner-name ' + (winner === p1Name ? 'p1' : 'p2');
    launchConfetti();
  }

  // Populate final rounds list
  const finalList = $('final-rounds-list');
  finalList.innerHTML = '';
  const icon = { STONE: '🪨', PAPER: '📄', SCISSORS: '✂️' };
  game.rounds.forEach(round => {
    const row = document.createElement('div');
    row.className = 'round-row';
    const badge = round.result === 'PLAYER1_WINS' ? `<span class="rr-badge badge-p1">${p1Name}</span>` :
                  round.result === 'PLAYER2_WINS' ? `<span class="rr-badge badge-p2">${p2Name}</span>` :
                  `<span class="rr-badge badge-tie">TIE</span>`;
    row.innerHTML = `
      <span class="rr-num">R${round.roundNumber}</span>
      <span class="rr-p1">${icon[round.player1Choice]} ${round.player1Choice}</span>
      ${badge}
      <span class="rr-p2">${round.player2Choice} ${icon[round.player2Choice]}</span>
    `;
    finalList.appendChild(row);
  });

  showScreen('result');
}

// ── Play again ────────────────────────────────────
$('play-again-btn').addEventListener('click', () => {
  gameId = null; p1Choice = null; p2Choice = null; completedRounds = 0;
  $('p1-name').value = ''; $('p2-name').value = '';
  $('setup-error').classList.remove('show');
  showScreen('setup');
});

// ── Confetti ──────────────────────────────────────
function launchConfetti() {
  const colors = ['#00f5c8','#ff4ec8','#ffe100','#4ec8ff','#c8ff4e'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}vw;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${4+Math.random()*8}px;
      height: ${4+Math.random()*8}px;
      animation-duration: ${1.5+Math.random()*2}s;
      animation-delay: ${Math.random()*.6}s;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ── Init ──────────────────────────────────────────
showScreen('setup');
</script>
</body>
</html>
